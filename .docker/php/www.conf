[www]
user = nobody
group = nobody
listen = 127.0.0.1:9000
listen.backlog = 128

pm = ondemand
pm.max_children = 10
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 15
pm.max_requests = 500

pm.process_idle_timeout = 10s
request_terminate_timeout = 300

catch_workers_output = yes

pm.status_path = /fpm-status
request_slowlog_timeout = 5s
slowlog = /dev/stderr