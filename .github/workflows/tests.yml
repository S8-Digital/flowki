name: ci

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mailparse

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        # npm workspaces: installs root, shared/, and mobile/ in one pass
        run: npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate --with-form --no-interaction

      - name: Check PHP Style (Pint)
        run: vendor/bin/pint --test

      - name: Check Frontend Formatting (Prettier)
        run: npm run format:check

      - name: Lint Frontend (ESLint)
        run: npx eslint .

      - name: Build Assets
        run: npm run build

      - name: Frontend Tests (web)
        run: npm run test

      - name: Mobile Tests
        # Run from repo root so the npm workspace resolves vitest from
        # node_modules (mobile/package.json lists vitest as a devDependency
        # hoisted to the root by the workspace).
        run: npm run test --workspace=mobile

      - name: PHP Tests
        run: ./vendor/bin/paratest --runner WrapperRunner --processes 12