name: Create Roadmap Issues

on:
  workflow_dispatch:
  push:
    branches:
      - 'copilot/create-github-issues-flowki-app'
    paths:
      - '.github/workflows/create-roadmap-issues.yml'
      - '.github/roadmap/issues.json'

permissions:
  issues: write
  contents: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create roadmap labels, milestones and issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            // ── helpers ────────────────────────────────────────────────────────────
            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
                console.log(`Label already exists: ${name}`);
              } catch {
                await github.rest.issues.createLabel({ owner, repo, name, color, description });
                console.log(`Created label: ${name}`);
              }
            }

            async function ensureMilestone(title, description) {
              const { data: milestones } = await github.rest.issues.listMilestones({
                owner, repo, state: 'open', per_page: 100
              });
              const existing = milestones.find(m => m.title === title);
              if (existing) {
                console.log(`Milestone already exists: ${title} (#${existing.number})`);
                return existing.number;
              }
              const { data: m } = await github.rest.issues.createMilestone({ owner, repo, title, description });
              console.log(`Created milestone: ${title} (#${m.number})`);
              return m.number;
            }

            async function createIssue(title, body, labels, milestoneNumber) {
              const { data: existing } = await github.rest.issues.listForRepo({
                owner, repo, state: 'all', per_page: 100
              });
              const dup = existing.find(i => i.title === title);
              if (dup) {
                console.log(`Issue already exists: "${title}" (#${dup.number})`);
                return dup.number;
              }
              const { data: issue } = await github.rest.issues.create({
                owner, repo, title, body, labels,
                milestone: milestoneNumber
              });
              console.log(`Created issue: "${title}" (#${issue.number})`);
              return issue.number;
            }

            // ── labels ─────────────────────────────────────────────────────────────
            await ensureLabel('feature',     '0075ca', 'New feature or request');
            await ensureLabel('enhancement', 'a2eeef', 'Enhancement to an existing feature');
            await ensureLabel('frontend',    '7057ff', 'Frontend (Vue 3 / TypeScript)');
            await ensureLabel('backend',     'e4e669', 'Backend (Laravel / PHP)');
            await ensureLabel('mobile',      'd93f0b', 'Mobile (iOS / Android / React Native)');

            // ── milestones ─────────────────────────────────────────────────────────
            const milestoneMap = {
              'v1 Multi-User Foundation': await ensureMilestone(
                'v1 Multi-User Foundation',
                'Core multi-user collaboration: roles, permissions, member colours, assignments, schedule view.'
              ),
              'v2 Family Enhancements': await ensureMilestone(
                'v2 Family Enhancements',
                'Family-focused enhancements: roster upload, weather widget, fine-grained permissions.'
              ),
              'v3 Engagement': await ensureMilestone(
                'v3 Engagement',
                'Engagement & communication: gamification, family chat, AI/MCP capabilities.'
              ),
              'v4 Mobile': await ensureMilestone(
                'v4 Mobile',
                'Mobile & PWA: Firebase setup, iOS/Android native apps, PWA enhancements.'
              ),
            };

            // ── issues ─────────────────────────────────────────────────────────────
            const issueData = JSON.parse(
              fs.readFileSync('.github/roadmap/issues.json', 'utf8')
            );

            const created = [];
            for (const issue of issueData) {
              const milestoneNumber = milestoneMap[issue.milestone] ?? null;
              const number = await createIssue(
                issue.title,
                issue.body,
                issue.labels,
                milestoneNumber
              );
              created.push({ number, title: issue.title });
            }

            // ── summary ────────────────────────────────────────────────────────────
            console.log('\n=== ROADMAP ISSUES SUMMARY ===');
            for (const i of created) {
              console.log(`#${i.number} - ${i.title}`);
            }
            console.log(`\nCreated ${created.length} issues for roadmap features. Ready for assignment/branching.`);
