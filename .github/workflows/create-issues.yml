name: Create Roadmap Issues

on:
  push:
    branches:
      - 'copilot/mobile-first-launch'
    paths:
      - '.github/workflows/create-issues.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Check if issues already created
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'phase-0',
              state: 'open'
            });
            if (issues.length > 0) {
              console.log(`Found ${issues.length} existing phase-0 issues – skipping creation.`);
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Create milestone
        id: milestone
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            let milestoneNumber;
            try {
              const ms = await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Mobile MVP + Sync – April/May 2026',
                description: 'Phase 0: Mobile App + Firebase Realtime Sync, Phase 1: Voice AI, Phase 2: Meal Planner & Gamification, Phase 3: Polish'
              });
              milestoneNumber = ms.data.number;
              console.log(`Created milestone: ${milestoneNumber}`);
            } catch (e) {
              if (e.status === 422) {
                const milestones = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                const existing = milestones.data.find(m => m.title === 'Mobile MVP + Sync – April/May 2026');
                milestoneNumber = existing ? existing.number : undefined;
                console.log(`Milestone already exists: ${milestoneNumber}`);
              } else throw e;
            }
            core.setOutput('number', milestoneNumber);

      - name: Create labels
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'mobile-first', color: '0075ca', description: 'Mobile-first feature or initiative' },
              { name: 'priority-critical', color: 'd73a4a', description: 'Critical priority' },
              { name: 'priority-high', color: 'e4e669', description: 'High priority' },
              { name: 'priority-medium', color: 'a2eeef', description: 'Medium priority' },
              { name: 'priority-low', color: 'cfd3d7', description: 'Low priority' },
              { name: 'phase-0', color: 'b60205', description: 'Phase 0: Mobile MVP + Firebase Realtime Sync' },
              { name: 'phase-1', color: 'e99695', description: 'Phase 1: Voice AI Integration' },
              { name: 'phase-2', color: 'f9d0c4', description: 'Phase 2: Meal Planner & Gamification' },
              { name: 'phase-3', color: 'fef2c0', description: 'Phase 3: Extras / Post-MVP Polish' },
              { name: 'firebase', color: 'ffca28', description: 'Firebase related' },
              { name: 'voice', color: '7057ff', description: 'Voice / AI assistant integration' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Label already exists: ${label.name}`);
                } else throw e;
              }
            }

      - name: Create Issue 1 – Firebase RTDB Sync Mirror
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const ms = '${{ steps.milestone.outputs.number }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              milestone: ms ? parseInt(ms) : undefined,
              title: 'Implement Real-Time Data Sync Mirror with Firebase Realtime Database (Postgres → RTDB)',
              labels: ['mobile-first', 'priority-critical', 'phase-0', 'firebase'],
              body: [
                '## Description',
                '',
                'Mirror shared family data (todos, chores, shopping lists, calendar events, notifications) from Postgres to Firebase Realtime Database for instant client-side sync. Laravel saves to Postgres first, then pushes serialized changes to RTDB. Clients (web + mobile) listen directly to RTDB paths for live updates.',
                '',
                '## Why',
                '',
                'FCM is notifications only; RTDB provides true real-time listeners, offline persistence, and auto-sync — delivering the instant cross-device feel you want (beats Maple/Family Wall sync bugs). Postgres stays source of truth for complex queries/backups.',
                '',
                '## Acceptance Criteria',
                '',
                '- RTDB structure: `/families/{family_id}/todos/{todo_id}` (object with all fields), same for chores/shopping_items/events/notifications.',
                '- Laravel: Use model observers/events (e.g., `TodoObserver`) or queued jobs to sync on create/update/delete (e.g., `$firebase->database()->getReference("families/{$family->id}/todos/{$todo->id}")->set($todo->toSyncArray())`). Handle deletes with `.remove()`.',
                '- Initial sync: Artisan command to bulk mirror existing families on first setup.',
                '- Web (React/Inertia): Firebase JS SDK listeners (`.on(\'value\')`, `.on(\'child_changed\')`) update Redux/Inertia props optimistically.',
                '- Mobile (Expo): Same Firebase JS SDK listeners in components/hooks; update Redux state.',
                '- Offline: Enable Firebase persistence (`firebase.database().enablePersistence()`); show offline indicator.',
                '- Conflict resolution: Last-write-wins (add `updated_at` timestamp in sync payload).',
                '- Security: Firebase rules restrict read/write to authenticated users in the family (check UID via custom claims or family_user pivot lookup).',
                '- Tests: Multi-client simulation (e.g., change on web → see on mobile).',
                '',
                '## Tech Notes',
                '',
                '- `kreait/laravel-firebase` for server writes.',
                '- `firebase/app` + `firebase/database` on web/mobile (`expo install firebase` works in managed workflow).',
                '- Start with todos + shopping lists (high collaboration).',
                '- Queue heavy syncs via Horizon to avoid blocking.',
                '',
                '## Effort',
                '',
                '**Medium (1.5–2 weeks).** Priority: Critical. Dependencies: Firebase project rules setup.',
              ].join('\n')
            });
            console.log('Created Issue 1');

      - name: Create Issue 2 – Mobile App MVP with Expo
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const ms = '${{ steps.milestone.outputs.number }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              milestone: ms ? parseInt(ms) : undefined,
              title: 'Build Mobile App MVP with Expo (Core Features + RTDB Listeners)',
              labels: ['mobile-first', 'priority-critical', 'phase-0', 'firebase'],
              body: [
                '## Description',
                '',
                'Expand the blank Expo scaffold (`/mobile`) into a native MVP with daily-use screens, pulling live data from Firebase RTDB.',
                '',
                '## Why',
                '',
                'Users expect a real native app; RTDB listeners make it feel instant and reliable.',
                '',
                '## Acceptance Criteria',
                '',
                '- **Auth:** Full flows (email/social/magic/2FA) via Sanctum + `expo-secure-store` for tokens.',
                '- **Dashboard:** Drag-reorder widgets (Today\'s Schedule, Todo List, Shopping List, Weather) pulling from RTDB.',
                '- **Tabs/Screens:** Calendar (`react-native-calendars` or custom), Todos (list + create/edit), Chores (recurring + completion), Shopping Lists (multi-list + check-off).',
                '- **Real-time:** RTDB listeners for live updates + optimistic UI.',
                '- **Notifications:** FCM rich pushes (already partially set up).',
                '- **Features:** Dark/light mode, per-member colours, global search (initially Postgres-backed).',
                '- Deep linking + offline indicator.',
                '',
                '## Tech Notes',
                '',
                '- `expo-router` for navigation.',
                '- Redux Toolkit for state (listeners dispatch actions).',
                '- UI: NativeBase/Tamagui or React Native Paper (avoid MUI for native perf).',
                '- API client: Sanctum for writes; RTDB for reads/live sync.',
                '- Start with Todos/Shopping/Calendar as core.',
                '',
                '## Effort',
                '',
                '**High (4 weeks for solid MVP).** Priority: Critical.',
              ].join('\n')
            });
            console.log('Created Issue 2');

      - name: Create Issue 3 – Push Notifications + Offline Sync
        if: steps.check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const ms = '${{ steps.milestone.outputs.number }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              milestone: ms ? parseInt(ms) : undefined,
              title: 'Enhance Mobile Push Notifications + Firebase Offline/Background Sync',
              labels: ['mobile-first', 'priority-high', 'phase-0', 'firebase'],
              body: [
                '## Description',
                '',
                'Finalize FCM pushes; leverage RTDB\'s built-in offline queuing for data sync.',
                '',
                '## Why',
                '',
                'Complements RTDB for true mobile reliability (edits offline → sync on reconnect).',
                '',
                '## Acceptance Criteria',
                '',
                '- Rich FCM pushes on assignments/completions/reminders (tap opens app to item).',
                '- RTDB persistence enabled; background fetch/sync via `expo-background-fetch`.',
                '- Conflict UI if merges needed (simple for now).',
                '',
                '## Tech Notes',
                '',
                '- `expo-notifications` + `expo-background-fetch` + `expo-task-manager`.',
                '- `firebase.database().enablePersistence()`.',
                '',
                '## Effort',
                '',
                '**Medium (1 week).** Priority: High.',
              ].join('\n')
            });
            console.log('Created Issue 3');

      - name: Create Issue 4 – Voice API + MCP Server (RTDB-Aware)
        if: steps.check.outputs.skip != 'true'
