                '',
                '## Acceptance Criteria',
                '',
                '- New `/api/voice/command` endpoint: natural language → structured MCP call → Postgres save → RTDB sync.',
                '- MCP tools (`createTodo`, `addShoppingItem`, `completeChore`, etc.) include RTDB write in handler.',
                '- Family-scoped + rate-limited.',
                '',
                '## Tech Notes',
                '',
                '- Laravel AI SDK + existing MCP; add Firebase writes post-save.',
                '',
                '## Effort',
                '',
