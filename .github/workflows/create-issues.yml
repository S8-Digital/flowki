                '',
                '## Acceptance Criteria',
                '',
                '- Custom actions + `shortcuts.xml`.',
                '- Triggers deep links or `/api/voice/command`.',
                '',
                '## Tech Notes',
                '',
                '- Expo plugin for `AndroidManifest`/shortcuts.',
                '',
                '## Effort',
                '',
                '**Medium (1 week).** Priority: High.',
              ].join('\n')
            });
            console.log('Created Issue 6');

      - name: Create Issue 7 – Meal Planner with RTDB Sync
        if: steps.check.outputs.skip != 'true'
