name: Auto-fix lint & formatting

on:
  push:
    branches-ignore:
      - main
      - develop

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm ci

      - name: Fix PHP Style (Pint)
        run: vendor/bin/pint

      - name: Fix Frontend Formatting (Prettier)
        run: npm run format

      - name: Fix Frontend Linting (ESLint)
        run: npm run lint

      - name: Commit Fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No lint/format fixes needed."
          else
            git commit -m "chore: auto-fix lint and formatting [skip ci]"
            git push
          fi
