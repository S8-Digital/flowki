name: Deploy to GCP

on:
  push:
    branches:
      - main

  # Allow triggering the workflow manually from the GitHub UI
  workflow_dispatch:

# Limit concurrency so only one deployment runs at a time per ref.
# A queued run cancels any currently-queued (but not in-progress) run.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # ── GCP ─────────────────────────────────────────────────────
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}

  # ── Artifact Registry ────────────────────────────────────────
  # e.g. australia-southeast1-docker.pkg.dev/my-project/flowki
  REGISTRY: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.APP_NAME }}

  # ── App ──────────────────────────────────────────────────────
  APP_NAME: ${{ vars.APP_NAME }}

  # ── Cloud Run ────────────────────────────────────────────────
  CLOUD_RUN_SERVICE: ${{ vars.APP_NAME }}
  CLOUD_RUN_JOB: ${{ vars.APP_NAME }}-migrate

permissions:
  # Required for Workload Identity Federation token exchange
  id-token: write
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Build & push Docker image to Artifact Registry
  # ────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Generate image metadata
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.APP_NAME }}"
          SHA_TAG="${IMAGE}:${{ github.sha }}"
          LATEST_TAG="${IMAGE}:latest"
          echo "image=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.latest_tag }}
          cache-to: type=inline

  # ────────────────────────────────────────────────────────────
  # 2. Run database migrations via a Cloud Run Job
  # ────────────────────────────────────────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Install gcloud components
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "473.0.0"

      - name: Update Cloud Run Job with new image
        run: |
          gcloud run jobs update "${{ env.CLOUD_RUN_JOB }}" \
            --image="${{ needs.build.outputs.image }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --quiet

      - name: Execute migration job and wait for completion
        run: |
          gcloud run jobs execute "${{ env.CLOUD_RUN_JOB }}" \
            --region="${{ env.GCP_REGION }}" \
            --project="${{ env.GCP_PROJECT_ID }}" \
            --wait \
            --quiet

  # ────────────────────────────────────────────────────────────
  # 3. Deploy new image to Cloud Run Service
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build, migrate]

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Install gcloud components
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "473.0.0"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          image: ${{ needs.build.outputs.image }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          # Traffic is shifted to the new revision only after a successful deploy
          flags: "--traffic=LATEST"

      - name: Print deployed URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
